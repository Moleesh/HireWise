# @format
name: Ping Supabase
on:
    schedule:
        - cron: '0 2 * * *'
    workflow_dispatch:

concurrency:
    group: ping-supabase-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    ping:
        runs-on: ubuntu-latest
        environment: HireWise
        timeout-minutes: 5
        steps:
            - name: Ping Supabase REST API
              env:
                  SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
                  SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
              run: |
                  set -euo pipefail
                  if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
                      echo "Supabase URL/key secrets are not configured."
                      exit 1
                  fi
                  curl --fail --show-error --silent --max-time 30 \
                      --retry 3 \
                      --retry-delay 5 \
                      --retry-all-errors \
                      --header "apikey: ${SUPABASE_ANON_KEY}" \
                      --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
                      "${SUPABASE_URL%/}/rest/v1/jobs?select=id&limit=1" \
                      --output /tmp/ping.json
                  cat /tmp/ping.json
                  echo "Supabase ping succeeded."
